name: Refresh feature radar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
      - run: npm run refresh -- --limit 20
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: npm run status -- --max-age-hours 72 --min-references 3
      - run: npm run audit
      - run: npm run coverage -- --min-references 3
      - run: npm run index
      - name: Commit refreshed inventory
        run: |
          if git diff --quiet -- data/feature-radar.json data/feature-radar.md data/feature-index.json; then
            echo "No feature radar changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feature-radar.json data/feature-radar.md data/feature-index.json
          git commit -m "Refresh feature radar"
          git push
